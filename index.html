<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mapa ZDP</title>

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet"/>
<link rel="icon" href="data:,">

<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="CSS/variables.css">
<link rel="stylesheet" href="CSS/map.css">
<link rel="stylesheet" href="CSS/legend.css">
<link rel="stylesheet" href="CSS/controls.css">
<link rel="stylesheet" href="CSS/bottom-panel.css">
<link rel="stylesheet" href="CSS/pr-charts.css">
  
<style>
#bottomPanelLogo img{
  max-width:180px;
  height:var(--legend-logo-height);
  object-fit:contain;
}
</style>
</head>

<body>
<div id="legendMount"></div>

<div id="map"></div>
<div id="zoomControl">
  <div id="zoomSlider"></div>
  <div id="zoomValue">Zoom: 10.0</div>
</div>
<div id="mapAttribution"></div>
<div id="searchButton">🔍</div>
<div id="kmToggle">KM: OFF</div>
<div id="searchPanel">
  <input type="text" id="searchInput" placeholder="Wpisz ID drogi...">
  <button id="searchSubmit">Szukaj</button>
</div>

<div id="bottomPanel">
    <!-- HEADER -->
  <div id="bottomPanelHeader">
    <div id="selectedRoad">Wybrana droga: -</div>
    <div id="selectedKm" style="margin-left:10px; font-weight:normal;"></div>
  </div>
  <!-- CONTENT PODZIELONY NA KOLUMNY -->
  <div id="bottomPanelContent">
    <div class="bp-column">
      <h4>Geometria</h4>
      <div id="bpGeometry">Brak danych</div>
    </div>
    <div class="bp-column">
      <h4>Parametry</h4>
      <div id="bpParams"></div>
    </div>
    <div class="bp-column">
      <h4>Pomiar Ruchu</h4>
      <div style="display:flex; gap:6px; margin-bottom:8px;">
        <button id="prBtnA" type="button">A</button>
        <button id="prBtnB" type="button">B</button>
        <button id="prBtnC" type="button">C</button>
      </div>
      <div id="bpRuch">-</div>
    </div>
    <div class="bp-column bp-chart-column">
      <div id="bpChartsWrapper">
        <div id="prLegendMain"></div>
        <div id="bpCharts"></div>
        <div id="prLegendSub"></div>
      </div>
    </div>
  </div>
  <div id="bottomPanelLogo">
    <img src="Logo ZDP.png" alt="ZDP Logo">
  </div>
</div>
  
<script src="JS/ui/html-loader.js"></script>
<script src="JS/state/app-state.js"></script> 
<script src="JS/state/Dictionary.js"></script>
<script src="JS/geo-loader.js"></script>
<script src="JS/map.js"></script>
<script src="JS/ui/legend.js"></script>
<script src="JS/ui/search.js"></script>
<script src="JS/ui/searchPulse.js"></script>
<script src="JS/ui/zoom.js"></script>
<script src="JS/ui/bottomPanel.js"></script>
<script src="JS/km-measure.js"></script>
<script src="JS/pr-csv.js"></script>
<script src="JS/pr-charts.js"></script>
<script src="JS/layers/roads.js"></script>
<script src="JS/layers/admin.js"></script>
<script src="JS/layers/km.js"></script>
<script src="JS/layers/pr.js"></script>
<script src="JS/ui/html-loader.js"></script>
<script src="JS/main.js"></script>

</body>
</html>
