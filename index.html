/* ===============================
SEARCH CONTROL
=============================== */
#searchButton{
  position:absolute;
  top:10px;
  right:calc(var(--legend-width) + 10px);
  z-index:60;
  width:42px;
  height:42px;
  background:white;
  border-radius:6px;

  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
  font-family:Arial,sans-serif;
  transition:right 0.3s ease;
}
body.legend-collapsed #searchButton{
  right:10px;
}
#searchPanel{
  position:absolute;
  top:60px;
  right:calc(var(--legend-width) + 10px);
  z-index:60;

  background:white;

body.legend-collapsed #searchPanel{

}

}

  position:absolute;
  top:60px;

  user-select:none;
}
body.legend-collapsed #kmToggle{
  right:10px;
}
/* ===============================
BOTTOM PANEL
=============================== */
#bottomPanel{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height: calc(var(--legend-logo-height) + var(--bottom-header-height));
  background:white;
  box-shadow:0 -3px 10px rgba(0,0,0,0.3);

  transition:transform 0.3s ease;
  z-index:90;
  display:flex;
  flex-direction:column;
  font-family:Arial,sans-serif;
}
#bottomPanel.open{
  transform:translateY(0);
}
#bottomPanelHandle{
  height:40px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
#bottomPanelHandle::before{
  content:"";
  width:60px;
  height:6px;
  background:#ccc;
  border-radius:3px;
}
#bottomPanelLogo{
  position: absolute;
  right: 0;
  top: var(--bottom-header-height);
  width: var(--legend-width);
  height: var(--legend-logo-height);
  border-left: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
}
#bottomPanelHeader{
  position: relative;
  height: var(--bottom-header-height);
  display: flex;
  align-items: center;
  padding: 0 15px;
  background: white;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
  z-index: 2;
  cursor: pointer;
  user-select: none;
}
#bottomPanelHeader::before{
  content:"";
  position:absolute;
  left:50%;
  top:6px;
  transform:translateX(-50%);
  width:60px;
  height:6px;
  background:#ccc;
  border-radius:3px;
}
#bottomPanelContent{
  display: flex;
  flex-direction: row;
  gap: 10px;
  padding: 10px;
  padding-right: calc(var(--legend-width) + 10px);
  height: calc(100% - 40px);
  box-sizing: border-box;
}

.bp-chart-column{

}

<script>
let PR_LAST_ROW = null;
let PR_CSV_RAW = null;
let CURRENT_KM_MARKER = null;
let KM_MEASURE_ENABLED = false;
// =========================
// PARSER CSV (Pomiar_Ruchu)
// =========================
function parseCSV(text){
  return text
    .split(/\r?\n/)
    .map(line => line.split(","))
    .filter(row => row.length > 1);
}
const months = {
  "sty":0, "lut":1, "mar":2, "kwi":3,
  "maj":4, "cze":5, "lip":6, "sie":7,
  "wrz":8, "paź":9, "lis":10, "gru":11
};
function parseDateSafe(v){
  if(!v) return null;
  v = v.toString().trim().replace(/\s+/g, ' ');
  // =========================
  // FORMAT 1:
  // 15 kwi 26 8:40:30
  // =========================
  let m1 = v.match(/^(\d{1,2})\s+([A-Za-zążźćńółęśĄŻŹĆŃÓŁĘŚ]+)\s+(\d{2})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/i);
  if(m1){
    const day = parseInt(m1[1], 10);
    const month = months[m1[2].toLowerCase()];
    const year = 2000 + parseInt(m1[3], 10);
    const hour = parseInt(m1[4], 10);
    const min = parseInt(m1[5], 10);
    const sec = parseInt(m1[6] || "0", 10);

    if(month == null) return null;
    return new Date(year, month, day, hour, min, sec);
  }
  // =========================
  // FORMAT 2:
  // 14.04.2026 07:59
  // 14.04.2026 07:59:30
  // =========================
  let m2 = v.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if(m2){
    const day = parseInt(m2[1], 10);
    const month = parseInt(m2[2], 10) - 1;
    const year = parseInt(m2[3], 10);
    const hour = parseInt(m2[4], 10);
    const min = parseInt(m2[5], 10);
    const sec = parseInt(m2[6] || "0", 10);
    return new Date(year, month, day, hour, min, sec);
  }
  return null;
}
function num(v){
  if(!v) return NaN;
  return parseFloat(v.toString().replace(",",".").replace(/[^\d.]/g,""));
}
function bin30(date){
  let m = date.getHours()*60 + date.getMinutes();
  let b = Math.round(m/30)*30 % 1440;
  return String(Math.floor(b/60)).padStart(2,'0') + ":" +
         String(b%60).padStart(2,'0');
}
function generateTimeBins(){
  let arr = [];
  for(let m=0;m<1440;m+=30){
    let h = String(Math.floor(m/60)).padStart(2,'0');
    let min = String(m%60).padStart(2,'0');
    arr.push(`${h}:${min}`);
  }
  return arr;
}
const NAW_DICT = {
  ASF: "Masa bitumiczna",
  GRU: "Grunt naturalny",
  KAM: "Kostka kamienna",
  BRU: "Bruk",
  TLU: "Tłuczeń",
  ZWR: "Żwir",
  PRF: "Kostka prefabrykowana"
};
const KL_DICT = {
  G: "G - Główna",
  Z: "Z - zbiorcza",
  L: "L - lokalna"
};
const ZUD_DICT = {
  2: "Standard 2",
  3: "Standard 3",
  4: "Standard 4",
  6: "Standard 6"
};
let PR_SELECTED_TYPES = {
  MOTO: true,
  SOMB: true,
  LSMC: true,
  SCBP: true,
  SCZP: true,
  ATBS: true,
  CGNR: true
};
let PR_CHART_MODE = "A"; // "A" | "B" | "C"
let PR_CHART_INSTANCE_MAIN = null;
let PR_CHART_INSTANCE_SUB = null;
let PR_SPEED_HIST = {};
let PR_TIME_HIST = {};


/* ===============================
PIPELINE LOAD
=============================== */
map.on('load',async()=>{
  await ZDP_LOAD_GEO_SOURCES(map);
  INIT_MAP_UI();
  INIT_ROADS_LAYER(map);
  INIT_ADMIN_LAYER(map);
  INIT_KM_LAYER(map);
  INIT_PR_LAYER(map);
  
  ZDP_LEGEND_INIT();
  INIT_SEARCH();
  INIT_KM_TOGGLE();
  INIT_PR_BUTTONS();
});
/* ===============================
INIT AFTER MAP LOAD
=============================== */

/* ===============================
PULSE HIGHLIGHT ANIMATION
=============================== */
let pulseAnimationFrame = null;
let pulseRadius = 0;
let pulseGrowing = true;
function START_PULSE_ANIMATION(){
  STOP_PULSE_ANIMATION();
  pulseRadius = 4;
  pulseGrowing = true;
  function animate(){
    if(!map.getLayer("search_pulse_layer")){
      pulseAnimationFrame = requestAnimationFrame(animate);
      return;
    }
    if(pulseGrowing){
      pulseRadius += 0.4;
      if(pulseRadius > 18) pulseGrowing = false;
    } else {
      pulseRadius -= 0.4;
      if(pulseRadius < 4) pulseGrowing = true;
    }
    map.setPaintProperty(
      "search_pulse_layer",
      "line-width",
      pulseRadius
    );
    pulseAnimationFrame = requestAnimationFrame(animate);
  }
  pulseAnimationFrame = requestAnimationFrame(animate);
}
function STOP_PULSE_ANIMATION(){
  if(pulseAnimationFrame){
    cancelAnimationFrame(pulseAnimationFrame);
    pulseAnimationFrame = null;
  }
  if(map.getLayer("search_pulse_layer")){
    map.removeLayer("search_pulse_layer");
  }
}
/* ===============================
ZOOM SLIDER (noUiSlider)
=============================== */
const zoomSlider = document.getElementById('zoomSlider');
const zoomValue = document.getElementById('zoomValue');
let isSyncingZoom = false;
noUiSlider.create(zoomSlider, {
  start: map.getZoom(),
  orientation: 'vertical',
  direction: 'rtl',
  step: 0.1,
  range: {
    min: 9.5,
    max: 22
  }
});
/* slider -> mapa */
zoomSlider.noUiSlider.on('slide', function(values){
  const zoom = parseFloat(values[0]);
  map.setZoom(zoom);
  zoomValue.innerText = "Zoom: " + zoom.toFixed(1);
});
/* mapa -> slider */
map.on('zoom', () => {
  if (isSyncingZoom) return;
  isSyncingZoom = true;
  const z = map.getZoom();
  zoomSlider.noUiSlider.set(z);
  zoomValue.innerText = "Zoom: " + z.toFixed(1);
  isSyncingZoom = false;
});
/* ===============================
CLICK → KILOMETR W PUNKCIE
=============================== */
map.on("click", async (e) => {
  if(!KM_MEASURE_ENABLED) return;
  const MAX_CLICK_DISTANCE_PX = 20;
  const clickPoint = turf.point([e.lngLat.lng, e.lngLat.lat]);
  let closestFeature = null;
  let closestPoint = null;
  let minDist = Infinity;
  ZDP_ALL_FEATURES.forEach(f => {
    if (f.properties?.adm !== "P") return;
    if (!f.geometry) return;
    try {
      const snapped = turf.nearestPointOnLine(f.geometry, clickPoint, {
        units: "kilometers"
      });
      const snappedLngLat = snapped.geometry.coordinates;
      const clickPixel = map.project([e.lngLat.lng, e.lngLat.lat]);
      const snappedPixel = map.project(snappedLngLat);
      const dx = clickPixel.x - snappedPixel.x;
      const dy = clickPixel.y - snappedPixel.y;
      const distPx = Math.sqrt(dx * dx + dy * dy);
      if (distPx > MAX_CLICK_DISTANCE_PX) return;
      if (distPx < minDist) {
        minDist = distPx;
        closestFeature = f;
        closestPoint = snapped;
      }
    } catch (e) {}
  });
  if (!closestFeature || !closestPoint) return;
  const km_s = closestFeature.properties?.km_s;
  const km_e = closestFeature.properties?.km_e;
  if (km_s == null || km_e == null) return;
  // =========================
  // USUŃ POPRZEDNI MARKER + POPUP
  // =========================
  if (CURRENT_KM_MARKER) {
    CURRENT_KM_MARKER.remove();
    CURRENT_KM_MARKER = null;
  }
  // =========================
  // MARKER NA DRODZE (SNAP)
  // =========================
  CURRENT_KM_MARKER = new maplibregl.Marker({
    color: "#ff0000"
  })
    .setLngLat(closestPoint.geometry.coordinates)
    .addTo(map);
  // =========================
  // OBLICZENIE KM
  // =========================
  const distFromStart = turf.length(
    turf.lineSlice(
      turf.point(closestFeature.geometry.coordinates[0]),
      closestPoint,
      closestFeature.geometry
    ),
    { units: "kilometers" }
  );
  const direction = km_e >= km_s ? 1 : -1;
  const kmValue = km_s + (distFromStart * 1000 * direction);
  const kmInt = Math.floor(kmValue / 1000);
  const m = Math.round(kmValue % 1000);
  /* =========================
   DOLNY PANEL
  ========================= */
  const nr = closestFeature.properties?.nr;
  document.getElementById("selectedRoad").innerText =
    `Wybrana droga: ${nr ?? "-"}`;
  document.getElementById("selectedKm").innerText =
    `KM: ${kmInt}+${String(m).padStart(3, "0")}`;
  const startKm = Math.min(km_s, km_e);
  const endKm = Math.max(km_s, km_e);
  const formatKm = (v) => {
    const kmPart = Math.floor(v / 1000);
    const mPart = v % 1000;
    return `${kmPart}+${String(mPart).padStart(3, "0")}`;
  };
  const lengthKm = Math.abs(km_e - km_s) / 1000;
  document.getElementById("bpGeometry").innerHTML = `
    <b>Początek:</b> ${formatKm(startKm)}<br>
    <b>Koniec:</b> ${formatKm(endKm)}<br>
    <b>Długość:</b> ${lengthKm.toFixed(3)} km
  `;
  // =========================
  // POBRANIE NAJBLIŻSZYCH FEATURE
  // =========================
  const klFeature  = GET_NEAREST_FEATURE_BY_PROP(clickPoint, "kl");
  const nawFeature = GET_NEAREST_FEATURE_BY_PROP(clickPoint, "naw");
  const zudFeature = GET_NEAREST_FEATURE_BY_PROP(clickPoint, "ZUD");
  // =========================
  // WARTOŚCI
  // =========================
  const klRaw  = klFeature?.properties?.kl;
  const nawRaw = nawFeature?.properties?.naw;
  const zudRaw = zudFeature?.properties?.ZUD;
  const klValue  = KL_DICT[klRaw]  ?? klRaw  ?? "-";
  const nawValue = NAW_DICT[nawRaw] ?? nawRaw ?? "-";
  const zudValue = ZUD_DICT[zudRaw] ?? zudRaw ?? "-";
  // =========================
  // PANEL
  // =========================
  document.getElementById("bpParams").innerHTML = `
    <b>Klasa drogi:</b> ${klValue}<br>
    <b>Nawierzchnia:</b> ${nawValue}<br>
    <b>ZUD:</b> ${zudValue}<br>
  `;
  // =========================
  // POMIAR RUCHU (PR)
  // =========================
  const prFeature = GET_NEAREST_PR(clickPoint, nr);
  PR_LAST_ROW = null;
  if(!prFeature){
    document.getElementById("bpRuch").innerHTML = `
      Brak danych pomiaru ruchu
    `;
  } else {
    const prId = prFeature.properties.PR;
    const row = PR_CSV_DATA[prId];
    await LOAD_PR_CSV(prId);
    PR_LAST_ROW = row; // <- zawsze ustaw wcześniej
    if(!row){
      document.getElementById("bpRuch").innerHTML = `Brak danych pomiaru ruchu`;
      return;
    } else {
      // ===== SUMA =====
      let sum = 0;
      let data = {};
      Object.keys(PR_SELECTED_TYPES).forEach(type => {
        if(PR_SELECTED_TYPES[type] && row[type] != null){
          sum += row[type];
          data[type] = row[type];
        }
      });
      if(sum === 0){
        document.getElementById("bpRuch").innerHTML = `Brak danych pomiaru ruchu`;
        document.getElementById("bpCharts").innerHTML = "";
        return;
      }
      // ===== GENERUJ WYKRES (canvas) =====
      const canvasId = "prChart";
      document.getElementById("bpRuch").innerHTML = `
        <b>SDR:</b> ${sum}<br><br>
      `;
      document.getElementById("bpCharts").innerHTML = `
        <canvas id="prMainChart"></canvas>
        <canvas id="prSubChart"></canvas>
      `;
      RENDER_PR_CHART();
    }
  }
});
function INIT_KM_TOGGLE(){
  const btn = document.getElementById("kmToggle");
  function updateUI(){
    btn.innerText = KM_MEASURE_ENABLED ? "KM: ON" : "KM: OFF";
    btn.style.background = KM_MEASURE_ENABLED ? "#2c3e50" : "white";
    btn.style.color = KM_MEASURE_ENABLED ? "white" : "black";
  }
  btn.addEventListener("click", () => {
    KM_MEASURE_ENABLED = !KM_MEASURE_ENABLED;
    if(!KM_MEASURE_ENABLED){
      // czyszczenie po wyłączeniu
      if(CURRENT_KM_MARKER){
        CURRENT_KM_MARKER.remove();
        CURRENT_KM_MARKER = null;
      }
    }
    updateUI();
  });
  updateUI(); // start OFF
}
function RENDER_PR_CHART(){
  const mainCtx = document.getElementById("prMainChart");
  const subCtx = document.getElementById("prSubChart");
  if(!mainCtx || !subCtx) return;
  CLEAR_PR_CHART();
  // =========================
  // TRYB A (PIE - bez zmian)
  // =========================
  if(PR_CHART_MODE === "A" || !PR_CHART_MODE){
    const LABEL_MAP = {
      MOTO: "Motocykle",
      SOMB: "Sam. os. i Mikrobusy",
      LSMC: "Lekkie Sam. Ciężarowe",
      SCBP: "Sam. Ciężarowe bez przycz.",
      SCZP: "Sam. Ciężarowe z przycz.",
      ATBS: "Autobusy",
      CGNR: "Ciągniki rolne"
    };
    const row = PR_LAST_ROW;
    if(!row){
      document.getElementById("bpCharts").innerHTML =
        "Brak danych PR";
      return;
    }
    let sum = 0;
    const data = {};
    Object.keys(PR_SELECTED_TYPES).forEach(type => {
      if(PR_SELECTED_TYPES[type] && row[type] != null){
        sum += row[type];
        data[type] = row[type];
      }
    });
    const labels = Object.keys(data).map(k => LABEL_MAP[k] ?? k);
    const values = Object.values(data);
    PR_CHART_INSTANCE_MAIN = new Chart(mainCtx, {
      type: "pie",
      data: { labels, datasets: [{ data: values }] }
    });
    PR_CHART_INSTANCE_SUB = new Chart(subCtx, {
      type: "doughnut",
      data: { labels, datasets: [{ data: values }] }
    });
    return;
  }
  // =========================
  // TRYB B - HISTOGRAM PRĘDKOŚCI
  // =========================
  if (PR_CHART_MODE === "B") {
    if (Object.keys(PR_SPEED_HIST).length === 0) {
      document.getElementById("bpCharts").innerHTML = "brak pomiaru";
      return;
    }
    const parseRange = (key) => {
      const m = key.match(/(\d+)-(\d+)/);
      return m ? parseInt(m[1]) : 0;
    };
    const sortedLabels = Object.keys(PR_SPEED_HIST)
      .sort((a, b) => parseRange(a) - parseRange(b));
    const values = sortedLabels.map(k => PR_SPEED_HIST[k]);
    PR_CHART_INSTANCE_MAIN = new Chart(mainCtx, {
      type: "bar",
      data: {
        labels: sortedLabels,
        datasets: [{
          label: "Prędkość (km/h)",
          data: values,
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            title: {
              display: true,
              text: "Przedziały prędkości"
            }
          },
          y: {
            title: {
              display: true,
              text: "Liczba pomiarów"
            },
            beginAtZero: true
          }
        }
      }
    });
    if (PR_CHART_INSTANCE_SUB) {
      PR_CHART_INSTANCE_SUB.destroy();
      PR_CHART_INSTANCE_SUB = null;
    }
    return;
  }
  // =========================
  // TRYB C - ROZKŁAD CZASU
  // =========================
  if(PR_CHART_MODE === "C"){
    if (Object.keys(PR_TIME_HIST).length === 0) {
      document.getElementById("bpCharts").innerHTML = "brak pomiaru";
      return;
    }
    const labels = generateTimeBins(); // stała oś czasu 00:00–23:30
    const values = labels.map(l => PR_TIME_HIST[l] || 0);
    PR_CHART_INSTANCE_MAIN = new Chart(mainCtx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Ruch (30 min)",
          data: values
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        }
      }
    });
    if (PR_CHART_INSTANCE_SUB) {
      PR_CHART_INSTANCE_SUB.destroy();
      PR_CHART_INSTANCE_SUB = null;
    }
    return;
  }
}
/* ===============================
STEROWANIE WYKRESAMI
=============================== */
function INIT_PR_BUTTONS(){
  const setChartMode = (mode) => {
    PR_CHART_MODE = mode;
    if(!PR_LAST_ROW) return;
    document.getElementById("bpCharts").innerHTML = `
      <canvas id="prMainChart"></canvas>
      <canvas id="prSubChart"></canvas>
    `;
    RENDER_PR_CHART();
  };
  document.getElementById("prBtnA").addEventListener("click", () => setChartMode("A"));
  document.getElementById("prBtnB").addEventListener("click", () => setChartMode("B"));
  document.getElementById("prBtnC").addEventListener("click", () => setChartMode("C"));
}
function CLEAR_PR_CHART(){
  if(PR_CHART_INSTANCE_MAIN) PR_CHART_INSTANCE_MAIN.destroy();
  if(PR_CHART_INSTANCE_SUB) PR_CHART_INSTANCE_SUB.destroy();
  PR_CHART_INSTANCE_MAIN = null;
  PR_CHART_INSTANCE_SUB = null;
}
function GET_NEAREST_FEATURE_BY_PROP(point, propName){
  const MAX_DISTANCE_PX = 20;
  let closest = null;
  let minDist = Infinity;
  ZDP_ALL_FEATURES.forEach(f => {
    if(!f.geometry) return;
    // filtr: tylko feature który ma daną właściwość
    if(f.properties?.[propName] == null) return;
    try{
      const snapped = turf.nearestPointOnLine(
        f.geometry,
        point,
        {units:"kilometers"}
      );
      const snappedLngLat = snapped.geometry.coordinates;
      const clickPixel = map.project(point.geometry.coordinates);
      const snappedPixel = map.project(snappedLngLat);
      const dx = clickPixel.x - snappedPixel.x;
      const dy = clickPixel.y - snappedPixel.y;
      const distPx = Math.sqrt(dx*dx + dy*dy);
      if(distPx > MAX_DISTANCE_PX) return;
      if(distPx < minDist){
        minDist = distPx;
        closest = f;
      }
    }catch(e){}
  });
  return closest;
}
async function LOAD_PR_CSV(prId){
  try{
    const res = await fetch(`Pomiar_Ruchu/${prId}.csv`);
    if(!res.ok) throw new Error("Brak pliku CSV");
    const text = await res.text();
    PR_CSV_RAW = parseCSV(text);
    PR_SPEED_HIST = {};
    PR_TIME_HIST = {};
    PR_CSV_RAW.forEach(r => {
      if(!r || r.length < 4) return;
      if(r[0].includes("Data i czas")) return;
      const t = parseDateSafe(r[0]);
      const sp = num(r[3]);
      if(!t || isNaN(sp)) return;
      const sb = Math.floor(sp / 10) * 10;
      const speedKey = `${sb}-${sb+9}`;
      PR_SPEED_HIST[speedKey] = (PR_SPEED_HIST[speedKey] || 0) + 1;
      const timeKey = bin30(t);
      PR_TIME_HIST[timeKey] = (PR_TIME_HIST[timeKey] || 0) + 1;
    });
    return true;
  }catch(e){
    console.warn("CSV load error:", e);
    PR_CSV_RAW = null;
    PR_SPEED_HIST = {};
    PR_TIME_HIST = {};
    return false;
  }
}
function GET_NEAREST_PR(point, roadNr){
  const MAX_DISTANCE_PX = 20;
  let closest = null;
  let minDist = Infinity;
  ZDP_ALL_FEATURES.forEach(f => {
    if(!f.geometry) return;
    if(!f.properties?.PR) return; // tylko PR
    try{
      const snapped = turf.nearestPointOnLine(
        f.geometry,
        point,
        {units:"kilometers"}
      );
      const snappedLngLat = snapped.geometry.coordinates;
      const clickPixel = map.project(point.geometry.coordinates);
      const snappedPixel = map.project(snappedLngLat);
      const dx = clickPixel.x - snappedPixel.x;
      const dy = clickPixel.y - snappedPixel.y;
      const distPx = Math.sqrt(dx*dx + dy*dy);
      if(distPx > MAX_DISTANCE_PX) return;
      if(distPx < minDist){
        minDist = distPx;
        closest = f;
      }
    }catch(e){}
  });
  if(!closest) return null;
  if(closest.properties?.nr !== roadNr){
    return null;
  }
  return closest;
}
