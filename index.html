<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZDP – Mapa</title>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
:root{
--legend-width:320px;
}

body{margin:0;font-family:Arial, sans-serif;overflow:hidden;}

#map{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* ===== LEGEND ===== */

#legend{
position:absolute;
top:0;
right:0;
width:var(--legend-width);
height:100vh;
background:#ffffff;
z-index:20;
display:flex;
flex-direction:column;
box-shadow:-2px 0 6px rgba(0,0,0,0.2);
}

#legendContent{
flex:1;
overflow-y:auto;
padding:15px;
}

#legend h2{margin-top:0;}

.legend-section{margin-bottom:20px;}

.legend-section h3{margin-bottom:8px;}

.legend-line{
display:inline-block;
width:20px;
height:4px;
margin-right:6px;
vertical-align:middle;
}

#legendLogo{
padding:10px;
text-align:center;
border-top:1px solid #ccc;
}

#legendLogo img{
max-width:100%;
height:auto;
}

#updateOverlay{
font-size:12px;
margin-bottom:10px;
}

/* ===== BASEMAP BUTTONS ===== */

#basemapButtons{
position:absolute;
top:10px;
left:10px;
z-index:30;
display:flex;
gap:6px;
}

.basemap-btn{
padding:6px 12px;
background:white;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.3);
cursor:pointer;
user-select:none;
font-size:14px;
}

.basemap-btn.active{
background:#0078ff;
color:white;
}

/* ===== SEARCH ===== */

#searchButton{
position:absolute;
top:10px;
right:calc(var(--legend-width) + 10px);
z-index:30;
padding:6px 12px;
background:white;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.3);
cursor:pointer;
}

#searchBox{
position:absolute;
top:50px;
right:calc(var(--legend-width) + 10px);
z-index:30;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.3);
display:none;
}

#searchBox input{
width:200px;
padding:4px;
}

</style>
</head>

<body>

<div id="basemapButtons">
<div class="basemap-btn active" data-map="Mapa">Mapa</div>
<div class="basemap-btn" data-map="Satelita">Satelita</div>
<div class="basemap-btn" data-map="Nocna">Nocna</div>
</div>

<div id="searchButton">Szukaj</div>
<div id="searchBox">
<input type="text" id="searchInput" placeholder="ID drogi..." />
<button id="searchExecute">OK</button>
</div>

<div id="legend">
<div id="legendContent">
<div id="updateOverlay">Aktualizacja: --</div>
<h2>Opcje Wyświetlania</h2>

<div class="legend-section">
<h3>Administracja Dróg</h3>
<label><input type="checkbox" data-layers="layer_adm_1" checked> <span class="legend-line" style="background:#FF0000"></span>Droga Krajowa</label><br>
<label><input type="checkbox" data-layers="layer_adm_2" checked> <span class="legend-line" style="background:#08FF00"></span>Droga Wojewódzka</label><br>
<label><input type="checkbox" data-layers="layer_adm_3" checked> <span class="legend-line" style="background:#A500AD"></span>Droga Powiatowa</label><br>
<label><input type="checkbox" data-layers="layer_adm_4"> <span class="legend-line" style="background:#808080"></span>Droga Gminna</label>
</div>

<div class="legend-section">
<h3>Zimowe Utrzymanie Dróg</h3>
<label><input type="checkbox" data-layers="layer_zud_2"> <span class="legend-line" style="background:#FFEE00"></span>Standard 2</label><br>
<label><input type="checkbox" data-layers="layer_zud_3"> <span class="legend-line" style="background:#00FFFF"></span>Standard 3</label><br>
<label><input type="checkbox" data-layers="layer_zud_4"> <span class="legend-line" style="background:#FA9EFF"></span>Standard 4</label><br>
<label><input type="checkbox" data-layers="layer_zud_6"> <span class="legend-line" style="background:#A1A1A1"></span>Standard 6</label>
</div>

</div>
<div id="legendLogo">
<img src="Logo ZDP.png" alt="ZDP Logo">
</div>
</div>

<div id="map"></div>

<script>

/* ===============================
MAP INIT
=============================== */

const bounds = [[14.0,51.75],[15.75,52.5]];

const map = new maplibregl.Map({
container:'map',
style:{
version:8,
sources:{},
layers:[]
},
center:[14.9,52.1],
zoom:9,
maxBounds:bounds
});

/* ===============================
BASEMAP CONFIG
=============================== */

const BASE_MAPS={
"Mapa":{
tiles:["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
tileSize:256,
attribution:"© OpenStreetMap contributors"
},
"Satelita":{
tiles:["https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
tileSize:256,
attribution:"Tiles © Esri"
},
"Nocna":{
tiles:["https://tiles.stadiamaps.com/tiles/alidade_dark/{z}/{x}/{y}.png"],
tileSize:256,
attribution:"© Stadia Maps"
}
};

function switchBasemap(name){

if(map.getLayer("basemap")) map.removeLayer("basemap");
if(map.getSource("basemap")) map.removeSource("basemap");

const cfg = BASE_MAPS[name];

map.addSource("basemap",{
type:"raster",
tiles:cfg.tiles,
tileSize:cfg.tileSize,
attribution:cfg.attribution
});

map.addLayer({
id:"basemap",
type:"raster",
source:"basemap"
});
}

switchBasemap("Mapa");

/* ===============================
BASEMAP BUTTONS
=============================== */

document.querySelectorAll(".basemap-btn").forEach(btn=>{
btn.addEventListener("click",()=>{
document.querySelectorAll(".basemap-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
switchBasemap(btn.dataset.map);
});
});

/* ===============================
SEARCH LOGIC (Partial + Highlight + Pulse)
=============================== */

let pulseFrame=null;
let pulseWidth=4;
let pulseGrow=true;

function normalize(str){
return str.toString().trim().toUpperCase();
}

function clearHighlight(){
if(pulseFrame) cancelAnimationFrame(pulseFrame);
if(map.getLayer("search_pulse")) map.removeLayer("search_pulse");
if(map.getLayer("search_highlight")) map.removeLayer("search_highlight");
if(map.getSource("search_source")) map.removeSource("search_source");
}

function pulse(){
if(!map.getLayer("search_pulse")) return;

pulseWidth += pulseGrow?0.4:-0.4;
if(pulseWidth>14) pulseGrow=false;
if(pulseWidth<4) pulseGrow=true;

map.setPaintProperty("search_pulse","line-width",pulseWidth);
pulseFrame=requestAnimationFrame(pulse);
}

function highlightByID(id){

const norm = normalize(id);

const features = ZDP_ALL_FEATURES.filter(f=>
f.properties?.ID && normalize(f.properties.ID).startsWith(norm)
);

if(!features.length){
alert("Nie znaleziono drogi");
return;
}

clearHighlight();

map.addSource("search_source",{
type:"geojson",
data:{type:"FeatureCollection",features:features}
});

map.addLayer({
id:"search_highlight",
type:"line",
source:"search_source",
paint:{
"line-color":"#00FFFF",
"line-width":6
}
});

map.addLayer({
id:"search_pulse",
type:"line",
source:"search_source",
paint:{
"line-color":"#00FFFF",
"line-width":pulseWidth,
"line-opacity":0.5
}
});

pulse();

/* FIT TO FULL GEOMETRY */

let coords=[];
features.forEach(f=>{
const extract=c=>Array.isArray(c[0])?c.forEach(extract):coords.push(c);
extract(f.geometry.coordinates);
});

let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
coords.forEach(c=>{
minX=Math.min(minX,c[0]);
minY=Math.min(minY,c[1]);
maxX=Math.max(maxX,c[0]);
maxY=Math.max(maxY,c[1]);
});

map.fitBounds([[minX,minY],[maxX,maxY]],{padding:60});
}

/* ===============================
SEARCH UI
=============================== */

const searchBtn=document.getElementById("searchButton");
const searchBox=document.getElementById("searchBox");

searchBtn.addEventListener("click",()=>{
searchBox.style.display = searchBox.style.display==="none"?"block":"none";
});

document.getElementById("searchExecute").addEventListener("click",()=>{
const val=document.getElementById("searchInput").value;
if(val) highlightByID(val);
});

</script>

</body>
</html>
