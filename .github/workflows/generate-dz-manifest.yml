name: Generate DZ manifest

on:
  push:
    paths:
      - "GEOJSON/EW/DZ/**"

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate manifest
        run: node scripts/generate-dz-manifest.js

      - name: Commit manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add GEOJSON/EW/DZ/manifest.json
          git commit -m "auto: update DZ manifest" || exit 0
          git push
